name: CI

on:
  push:
    branches: [main, audit-step102-fixes]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Syntax check
        run: python -m compileall app config
      - name: Run deterministic test suites
        env:
          OPENROUTER_API_KEY: test
          ANTHROPIC_API_KEY: test
        run: pytest tests/ -q
