<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Factory — Facility</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07101f;
      color: #b8cce0;
      font-family: 'Courier New', 'Lucida Console', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #060e1c;
      border-bottom: 1px solid #112236;
      height: 44px;
    }
    .hdr-title {
      font-size: 0.78em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4ab8e8;
    }
    .hdr-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 0.65em;
      letter-spacing: 0.08em;
    }
    .wstatus-ok  { color: #2ef09a; }
    .wstatus-deg { color: #ff5533; }
    .poll-ts     { color: #294a6a; }
    .stale-warn  { color: #ff5533; }

    /* ── Facility grid ───────────────────────────────────────────── */
    .facility {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      padding: 12px;
      height: calc(100vh - 44px);
    }

    /* ── Room ────────────────────────────────────────────────────── */
    .room {
      position: relative;
      background: #0b1628;
      border: 1px solid #112236;
      border-radius: 5px;
      padding: 14px 14px 10px;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .room:hover {
      border-color: var(--rc);
      box-shadow: 0 0 14px var(--rg);
    }
    .room.active  { border-color: var(--rc); box-shadow: inset 0 0 30px var(--rg); }
    .room.error   { border-color: #ff3030; box-shadow: inset 0 0 20px rgba(255,48,48,0.09); }
    .room.stale   { border-color: #e07020; box-shadow: inset 0 0 20px rgba(224,112,32,0.07); }

    /* corner accent */
    .room::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--rc, #4ab8e8) 0%, transparent 55%);
      opacity: 0.07;
      pointer-events: none;
      border-radius: 4px 0 0 0;
    }

    .room-hdr {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
    }
    .rdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--rc, #4ab8e8);
      flex-shrink: 0;
    }
    .room.active .rdot { animation: pulse 2.2s ease-in-out infinite; }
    .room.error  .rdot { background: #ff3030; animation: pulse 0.9s ease-in-out infinite; }
    .room.stale  .rdot { background: #e07020; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    .rlabel {
      font-size: 0.68em;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--rc, #4ab8e8);
      font-weight: bold;
    }
    .rsummary {
      font-size: 0.66em;
      color: #506a88;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    /* ── Room floor + wandering robot actors ─────────────────────────── */
    /* Robots wander the open floor via a shared rAF loop that writes each
       actor's translate3d() every frame (see startWander in the script). */
    .floor {
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;             /* clicks fall through to the room… */
      overflow: hidden;
    }
    .robot-actor {
      position: absolute; top: 0; left: 0;
      width: 33px; height: 48px;
      will-change: transform;
      pointer-events: auto;             /* …except the robot itself */
      cursor: pointer;
    }
    .robot-facing { display: block; }   /* scaleX(±1) flip set imperatively */
    .robot-actor .robot { margin: 0; }

    /* ── Panel overlay ───────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(3, 9, 22, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .panel {
      background: #0b1628;
      border: 1px solid #1e3d60;
      border-radius: 6px;
      padding: 22px 24px;
      width: 460px;
      max-width: 92vw;
      max-height: 82vh;
      overflow-y: auto;
      box-shadow: 0 0 50px rgba(74,184,232,0.12);
    }
    .panel-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel-title { font-size: 0.82em; letter-spacing: 0.15em; text-transform: uppercase; color: #4ab8e8; }
    .panel-close {
      background: none;
      border: 1px solid #1e3d60;
      color: #4a7aa0;
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.78em;
    }
    .panel-close:hover { border-color: #4ab8e8; color: #4ab8e8; }

    .psec { margin-bottom: 16px; }
    .psec-lbl {
      font-size: 0.6em; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2e4d6a;
      margin-bottom: 5px;
    }

    /* status badges */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 0.7em;
      font-weight: bold;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    .badge-active  { background: rgba(46,240,154,0.09); color: #2ef09a; border: 1px solid #2ef09a; }
    .badge-idle    { background: rgba(74,184,232,0.09); color: #4ab8e8; border: 1px solid #4ab8e8; }
    .badge-stale   { background: rgba(224,112,32,0.09); color: #e07020; border: 1px solid #e07020; }
    .badge-error   { background: rgba(255,48,48,0.09);  color: #ff6060; border: 1px solid #ff6060; }

    .wcard {
      background: rgba(255,255,255,0.02);
      border: 1px solid #112236;
      border-radius: 3px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .wcard-top { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
    .wcard-name { font-size: 0.78em; color: #c0d4ec; }
    .wcard-detail { font-size: 0.68em; color: #3a5a78; margin-top: 2px; }

    .counts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 7px;
    }
    .ccount {
      background: rgba(255,255,255,0.025);
      border: 1px solid #112236;
      border-radius: 3px;
      padding: 6px 8px;
      text-align: center;
    }
    .ccount-k { font-size: 0.58em; color: #2e4d6a; text-transform: uppercase; }
    .ccount-v { font-size: 1.18em; color: #b8cce0; font-weight: bold; }

    .elist { list-style: none; }
    .eitem { padding: 6px 0; border-bottom: 1px solid #0f1f35; font-size: 0.74em; }
    .eitem:last-child { border-bottom: none; }
    .esrc  { color: #4ab8e8; margin-bottom: 2px; }
    .emsg  { color: #7a9abb; }
    .etime { color: #243a54; font-size: 0.88em; }

    .no-errors { font-size: 0.74em; color: #2ef09a; }

    /* load / error full-screen */
    .fscreen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      font-size: 0.82em; letter-spacing: 0.12em; color: #2a4a68;
    }
    .fscreen.err { color: #ff5533; }

    /* ── Pixel-art robot (pure CSS, box-shadow pixel grid) ───────────── */
    /* Each robot is two 3px "pixel" elements whose huge box-shadow lists
       paint the whole sprite: .robot__body draws the chassis, .robot__eyes
       draws only the cyan eyes so they can blink independently. The blue
       accent pixels use var(--robot-accent) so each room tints its own robot
       to that room's accent colour — one shared grid, no per-room sprite. */
    .robot {
      position: relative;
      width: 33px;   /* 11 cells × 3px */
      height: 48px;  /* 16 cells × 3px */
      margin: 0 auto 3px;
      transform-origin: 50% 92%;
      image-rendering: pixelated;
      --robot-accent: #5aa0e8;
    }
    .robot__body, .robot__eyes {
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 3px;   /* one pixel cell; rest drawn via box-shadow */
      background: transparent;
    }
    .robot__eyes { filter: drop-shadow(0 0 1.5px #4ff7ff); }

    /* idle: calm "breathing" bob — clearly waiting, not dead */
    .robot--idle { animation: robot-breathe 2.6s ease-in-out infinite; }
    @keyframes robot-breathe {
      0%, 100% { transform: translateY(0)     scaleY(1);    }
      50%      { transform: translateY(-1px)  scaleY(1.035); }
    }

    /* working: faster side-to-side shuffle/waddle + blinking eyes */
    .robot--working { animation: robot-work 0.42s ease-in-out infinite; }
    @keyframes robot-work {
      0%   { transform: translateX(-1.5px) rotate(-3deg); }
      50%  { transform: translateX(1.5px)  rotate(3deg);  }
      100% { transform: translateX(-1.5px) rotate(-3deg); }
    }
    .robot--working .robot__eyes { animation: robot-blink 1.5s steps(1, end) infinite; }
    @keyframes robot-blink {
      0%, 88%, 100% { opacity: 1; }
      91%, 96%      { opacity: 0.08; }
    }

    /* stale: worker offline — dimmed, greyed, very slow drift */
    .robot--stale {
      animation: robot-breathe 5s ease-in-out infinite;
      opacity: 0.45;
      filter: grayscale(0.7);
    }
    .robot--stale .robot__eyes { opacity: 0.3; }

    /* error: agitated shudder */
    .robot--error { animation: robot-shudder 0.28s ease-in-out infinite; }
    @keyframes robot-shudder {
      0%, 100% { transform: translateX(-1px); }
      50%      { transform: translateX(1px);  }
    }

    /* ── Room scenes: JS pixel-grid rendered ONCE to a crisp scaled bg ── */
    /* Each room's scene is composed from a JS 2D colour grid (same technique
       as the robot sprite) but rendered to a tiny <canvas> → data-URI so it
       scales to the responsive tile crisply (image-rendering: pixelated).
       No image files, no image-generation calls — every pixel is JS-composed. */
    .scene {
      position: absolute; inset: 0; z-index: 0;
      pointer-events: none;
      image-rendering: pixelated;
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }
    /* accent "lighting" wash over the machinery */
    .scene-glow {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(130% 90% at 50% 24%, var(--rg) 0%, transparent 60%);
      mix-blend-mode: screen; opacity: 0.9;
    }
    /* keep the room's text label above the scene + robots */
    .room-hdr, .rsummary { position: relative; z-index: 3; }
    .rsummary { max-width: 64%; }

    /* room-level queued badge (real backlog count) */
    .qbadge-room {
      position: absolute; top: 7px; right: 8px; z-index: 3;
      font-size: 0.5em; letter-spacing: 0.04em; color: #a9bdd4;
      background: rgba(4,10,20,0.72); border: 1px solid #1b3350;
      border-radius: 3px; padding: 2px 5px; white-space: nowrap;
    }

    /* animated conveyor belt overlay (fulfillment) — motion a static scene
       image can't show; aligned to the belt drawn into the scene grid */
    .scene-conveyor {
      position: absolute; left: 6%; right: 6%; top: 45%; height: 5.5%;
      z-index: 1; pointer-events: none; opacity: 0.5; border-radius: 1px;
      background: repeating-linear-gradient(90deg,
        rgba(150,175,205,0.6) 0 6px, rgba(26,40,56,0.55) 6px 12px);
      background-size: 24px 100%;
      animation: convey 0.8s linear infinite;
    }
    @keyframes convey { from { background-position: 0 0; } to { background-position: -24px 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    const API = window.location.origin;
    const POLL = 7000;

    const ROOM_CFG = {
      research:     { icon: '🔭', color: '#a78bfa', glow: 'rgba(167,139,250,0.13)' },
      planning:     { icon: '📋', color: '#60a5fa', glow: 'rgba(96,165,250,0.13)' },
      content:      { icon: '✏️',  color: '#34d399', glow: 'rgba(52,211,153,0.13)' },
      image_studio: { icon: '🎨', color: '#f472b6', glow: 'rgba(244,114,182,0.13)' },
      qa:           { icon: '🔍', color: '#fbbf24', glow: 'rgba(251,191,36,0.13)' },
      storefront:   { icon: '🏪', color: '#38bdf8', glow: 'rgba(56,189,248,0.13)' },
      marketing:    { icon: '📣', color: '#fb923c', glow: 'rgba(251,146,60,0.13)' },
      fulfillment:  { icon: '📦', color: '#4ade80', glow: 'rgba(74,222,128,0.13)' },
      ledger:       { icon: '📊', color: '#e879f9', glow: 'rgba(232,121,249,0.13)' },
    };

    const ORDER = [
      'research', 'planning', 'content',
      'image_studio', 'qa', 'storefront',
      'marketing', 'fulfillment', 'ledger',
    ];

    /* ── Pixel-art robot ───────────────────────────────────────────────
       The robot is defined as a readable 2D grid (one char per pixel), and
       the box-shadow CSS is generated from it at load time — no hand-written
       coordinates, no image files, no image-generation calls. Reference look:
       chunky white/grey body, blue accent panels, dark visor, two cyan eyes,
       black outline, antenna. 'B' pixels resolve to var(--robot-accent) so a
       room can tint its robot to its own accent colour. */
    const PX = 3;
    const ROBOT_COLORS = {
      K: '#0a0a12',                      // black outline
      W: '#eef3f8',                      // white body
      V: '#14263e',                      // dark head visor
      C: '#4ff7ff',                      // cyan eyes (separate layer, can blink)
      B: 'var(--robot-accent, #5aa0e8)', // blue accent panels — per-room tint
    };
    const ROBOT_GRID = [
      ".....K.....",  // antenna tip
      ".....K.....",  // antenna stem
      ".KKKKKKKKK.",  // head top
      ".KWWWWWWWK.",  // forehead
      ".KVVVVVVVK.",  // visor top
      ".KVCCVCCVK.",  // eyes
      ".KVVVVVVVK.",  // visor bottom
      ".KWWWWWWWK.",  // chin
      "KKKKKKKKKKK",  // shoulders (outline)
      "KBBWWWWWBBK",  // shoulders (blue) + white neck
      "KBWWWWWWWBK",  // arms (blue) + chest
      "KBWWBBBWWBK",  // chest panel (blue)
      "KBWWBBBWWBK",  // chest panel
      "KBWWWWWWWBK",  // lower chest
      "KKWWWWWWWKK",  // waist
      "..KKK.KKK..",  // legs / feet
    ];

    function buildShadows(grid, opts) {
      opts = opts || {};
      const parts = [];
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < grid[r].length; c++) {
          const ch = grid[r][c];
          if (ch === '.') continue;
          if (opts.only && opts.only.indexOf(ch) === -1) continue;
          if (opts.exclude && opts.exclude.indexOf(ch) !== -1) continue;
          const color = ROBOT_COLORS[ch];
          if (!color) continue;
          parts.push(`${c * PX}px ${r * PX}px 0 0 ${color}`);
        }
      }
      return parts.join(', ');
    }

    // Computed once: identical for every robot (accent is a CSS var, so a
    // single shadow string serves all rooms — no per-room recompute).
    const BODY_SHADOW = buildShadows(ROBOT_GRID, { exclude: ['C'] });
    const EYES_SHADOW = buildShadows(ROBOT_GRID, { only: ['C'] });

    function Robot({ state, accent }) {
      const cls =
        state === 'working' ? 'robot--working' :
        state === 'stale'   ? 'robot--stale'   :
        state === 'error'   ? 'robot--error'   : 'robot--idle';
      return (
        <div className={`robot ${cls}`} style={{ '--robot-accent': accent }}>
          <div className="robot__body" style={{ boxShadow: BODY_SHADOW }} />
          <div className="robot__eyes" style={{ boxShadow: EYES_SHADOW }} />
        </div>
      );
    }

    // Robot activity is driven ENTIRELY by the server's real per-room status
    // (already computed in /dashboard/rooms/status from heartbeats / real task
    // counts / recent-activity). 'active' → working, everything else → idle
    // (stale = worker offline, error = failing).
    function robotState(room) {
      switch (room.status) {
        case 'active': return 'working';
        case 'stale':  return 'stale';
        case 'error':  return 'error';
        default:       return 'idle';
      }
    }

    // Real queued/backlog work that is NOT currently being processed (workers
    // are single-threaded/sequential in this codebase, so surplus work is a
    // text badge — never a fake second "working" robot). Uses only counts the
    // status endpoint already returns.
    function backlog(rkey, room) {
      const c = room.counts || {};
      if (rkey === 'planning')  return c.queue || 0;                  // TaskQueue depth
      if (rkey === 'qa')        return Math.max(0, (c.QA || 0) - 1);  // 1 validated at a time
      if (rkey === 'marketing') return c.pending || 0;               // posts awaiting send
      return 0;
    }

    function Badge({ status }) {
      return <span className={`badge badge-${status}`}>{status}</span>;
    }

    /* ── Panel ─────────────────────────────────────────────────────── */
    function Panel({ sel, rooms, onClose }) {
      if (!sel) return null;
      const room = rooms[sel.key];
      if (!room) return null;
      const cfg = ROOM_CFG[sel.key] || {};

      let title, body;

      if (sel.type === 'char') {
        const c = (room.characters || [])[sel.idx] || {};
        title = `${cfg.icon} ${c.name}`;
        body = (
          <>
            <div className="psec">
              <div className="psec-lbl">Status</div>
              <Badge status={c.status || 'idle'} />
            </div>
            {c.heartbeat_age_s !== undefined && c.heartbeat_age_s !== null && (
              <div className="psec">
                <div className="psec-lbl">Heartbeat</div>
                <div style={{fontSize:'0.82em', color:'#c0d4ec'}}>{c.heartbeat_age_s}s ago</div>
              </div>
            )}
            {c.detail && (
              <div className="psec">
                <div className="psec-lbl">Detail</div>
                <div style={{fontSize:'0.78em', color:'#7a9abb'}}>{c.detail}</div>
              </div>
            )}
          </>
        );
      } else {
        title = `${cfg.icon} ${room.label}`;
        body = (
          <>
            <div className="psec">
              <div className="psec-lbl">Status</div>
              <div style={{display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap'}}>
                <Badge status={room.status} />
                <span style={{fontSize:'0.76em', color:'#506a88'}}>{room.summary}</span>
              </div>
            </div>

            {(room.characters || []).length > 0 && (
              <div className="psec">
                <div className="psec-lbl">Workers / Agents</div>
                {room.characters.map((c, i) => (
                  <div key={i} className="wcard">
                    <div className="wcard-top">
                      <Badge status={c.status || 'idle'} />
                      <span className="wcard-name">{c.name}</span>
                    </div>
                    {c.heartbeat_age_s !== undefined && c.heartbeat_age_s !== null && (
                      <div className="wcard-detail">Heartbeat: {c.heartbeat_age_s}s ago</div>
                    )}
                    {c.detail && <div className="wcard-detail">{c.detail}</div>}
                  </div>
                ))}
              </div>
            )}

            {room.counts && Object.keys(room.counts).length > 0 && (
              <div className="psec">
                <div className="psec-lbl">Counts</div>
                <div className="counts-grid">
                  {Object.entries(room.counts).map(([k, v]) => (
                    <div key={k} className="ccount">
                      <div className="ccount-k">{k.replace(/_/g, ' ')}</div>
                      <div className="ccount-v">
                        {typeof v === 'boolean' ? (v ? 'ON' : 'OFF') : v}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="psec">
              <div className="psec-lbl">Recent Errors</div>
              {(room.events || []).length === 0
                ? <div className="no-errors">No recent errors</div>
                : (
                  <ul className="elist">
                    {room.events.map((e, i) => (
                      <li key={i} className="eitem">
                        <div className="esrc">{e.source}</div>
                        <div className="emsg">{e.message}</div>
                        <div className="etime">{e.at ? new Date(e.at).toLocaleString() : ''}</div>
                      </li>
                    ))}
                  </ul>
                )
              }
            </div>
          </>
        );
      }

      return (
        <div className="overlay" onClick={onClose}>
          <div className="panel" onClick={e => e.stopPropagation()}>
            <div className="panel-hdr">
              <span className="panel-title">{title}</span>
              <button className="panel-close" onClick={onClose}>[ × ]</button>
            </div>
            {body}
          </div>
        </div>
      );
    }

    /* ══ Pixel-art room scenes ════════════════════════════════════════════
       Same "2D grid of colour values" idea as the robot, but a room scene is
       large and must fill a responsive tile, so its grid is rendered ONCE to a
       tiny <canvas> and used as a crisp (image-rendering: pixelated) background
       — an equivalent scalable approach to the robot's box-shadow list. Scenes
       are composed from reusable element "stamps" (cabinet, monitor, crate, …)
       so we never hand-place hundreds of cells. Nothing here is an image file
       or an image-generation call: every pixel comes from JS-composed grids. */
    const GW = 84, GH = 48;   // scene grid (~1.75:1, close to a room tile)
    const HORIZON = 26;       // machinery sits above; open floor below

    function lighten(hex, amt) {
      const n = parseInt((hex || '#5aa0e8').slice(1), 16);
      let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      r = Math.round(r + (255 - r) * amt);
      g = Math.round(g + (255 - g) * amt);
      b = Math.round(b + (255 - b) * amt);
      return `rgb(${r},${g},${b})`;
    }
    function scenePalette(accent) {
      return {
        f:'#0b1420', F:'#0e1a28', g:'#16293c',              // floor tiles + grid
        k:'#05070c', d:'#1b2938', m:'#2b3e52', l:'#4a627e', h:'#6f8aa8', // metals dark→light
        s:'#08161f', S:'#0d2a38',                            // screen bases
        a:accent, A:lighten(accent, 0.55), o:'#9fc2ff',      // accent + highlight + cool
        w:'#d3e0ef', y:'#ffd36b', r:'#ff6060', G:'#54efad',  // white, bulb, red, green
      };
    }
    const mkGrid = () => Array.from({ length: GH }, () => Array(GW).fill('.'));
    const P  = (grid, x, y, c) => { x |= 0; y |= 0; if (y >= 0 && y < GH && x >= 0 && x < GW) grid[y][x] = c; };
    const R  = (grid, x, y, w, h, c) => { for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) P(grid, x + i, y + j, c); };
    const FR = (grid, x, y, w, h, c) => { for (let i = 0; i < w; i++) { P(grid, x+i, y, c); P(grid, x+i, y+h-1, c); } for (let j = 0; j < h; j++) { P(grid, x, y+j, c); P(grid, x+w-1, y+j, c); } };
    const HL = (grid, x, y, w, c) => { for (let i = 0; i < w; i++) P(grid, x + i, y, c); };
    const VL = (grid, x, y, h, c) => { for (let j = 0; j < h; j++) P(grid, x, y + j, c); };
    function LN(grid, x0, y0, x1, y1, c) {   // Bresenham line
      x0|=0; y0|=0; x1|=0; y1|=0;
      const dx = Math.abs(x1-x0), dy = -Math.abs(y1-y0);
      const sx = x0<x1?1:-1, sy = y0<y1?1:-1; let e = dx+dy;
      for (;;) { P(grid, x0, y0, c); if (x0===x1 && y0===y1) break; const e2 = 2*e; if (e2>=dy){e+=dy;x0+=sx;} if (e2<=dx){e+=dx;y0+=sy;} }
    }

    /* ── reusable element stamps ────────────────────────────────────── */
    function stampFloor(grid) {
      for (let y = HORIZON; y < GH; y++) for (let x = 0; x < GW; x++) grid[y][x] = (((x>>2)+(y>>2)) & 1) ? 'F' : 'f';
      for (let x = 0; x < GW; x += 4) VL(grid, x, HORIZON, GH - HORIZON, 'g');
      for (let y = HORIZON; y < GH; y += 4) HL(grid, 0, y, GW, 'g');
      HL(grid, 0, HORIZON, GW, 'l'); HL(grid, 0, HORIZON + 1, GW, 'd');
    }
    function cabinet(grid, x, y, w, h) {
      R(grid, x, y, w, h, 'd'); FR(grid, x, y, w, h, 'k');
      HL(grid, x+1, y+1, w-2, 'l'); VL(grid, x+1, y+1, h-2, 'm');
      P(grid, x-1, y+h, 'k'); P(grid, x+w, y+h, 'k');
    }
    function screen(grid, x, y, w, h) {
      R(grid, x, y, w, h, 'm'); FR(grid, x, y, w, h, 'k'); R(grid, x+1, y+1, w-2, h-2, 'S');
      for (let j = y+2; j < y+h-1; j += 2) HL(grid, x+2, j, w-4, 'a');
    }
    function monitor(grid, x, y, w, h) {
      R(grid, x, y, w, h, 'm'); FR(grid, x, y, w, h, 'k'); R(grid, x+1, y+1, w-2, h-2, 'S');
      R(grid, x+2, y+2, w-4, h-4, 'a'); VL(grid, x + (w>>1), y+h, 2, 'l');
    }
    const lights = (grid, arr) => arr.forEach(([x,y,c]) => P(grid, x, y, c));
    function crate(grid, x, y, w, h) { R(grid, x, y, w, h, 'm'); FR(grid, x, y, w, h, 'k'); HL(grid, x+1, y+(h>>1), w-2, 'd'); VL(grid, x+(w>>1), y+1, h-2, 'd'); }
    function shelf(grid, x, y, w) {
      HL(grid, x, y, w, 'l'); HL(grid, x, y+8, w, 'l'); VL(grid, x, y, 9, 'd'); VL(grid, x+w-1, y, 9, 'd');
      let ix = x+1, n = 0;
      while (ix < x+w-2) { R(grid, ix, y+2, 2, 5, n%3===0 ? 'a' : (n%2 ? 'h' : 'm')); ix += 3; n++; }
    }
    function telescope(grid, x, y) {
      LN(grid, x, y+10, x+14, y-2, 'l'); LN(grid, x+1, y+10, x+15, y-2, 'm');
      R(grid, x+13, y-4, 4, 4, 'd'); FR(grid, x+13, y-4, 4, 4, 'k'); P(grid, x+15, y-3, 'A');
      LN(grid, x+6, y+4, x+3, y+12, 'd'); LN(grid, x+6, y+4, x+10, y+12, 'd');
    }
    function antenna(grid, x, y, h) {
      VL(grid, x, y, h, 'l'); VL(grid, x+1, y, h, 'd');
      LN(grid, x, y, x-5, y+h, 'd'); LN(grid, x+1, y, x+6, y+h, 'd');
      P(grid, x, y-1, 'A'); P(grid, x, y-2, 'a');
    }
    function rings(grid, cx, cy, c) {
      for (const rad of [4,7,10,13]) for (let a = 0; a < 360; a += 20)
        P(grid, cx + Math.round(Math.cos(a*Math.PI/180)*rad), cy + Math.round(Math.sin(a*Math.PI/180)*rad*0.7), c);
    }
    function bars(grid, x, y, w, h) {
      const v = [0.4,0.7,0.5,0.9,0.6,0.8], bw = Math.max(1, ((w/v.length)|0) - 1);
      v.forEach((t,i) => { const bh = Math.max(1, (t*h)|0); R(grid, x + i*(bw+1), y+h-bh, bw, bh, i%2 ? 'a' : 'A'); });
    }
    function coins(grid, x, y) { for (let s = 0; s < 4; s++) { R(grid, x, y - s*3, 10, 2, 'y'); FR(grid, x, y - s*3, 10, 2, 'k'); } }
    function pinboard(grid, x, y, w, h) {
      R(grid, x, y, w, h, 'd'); FR(grid, x, y, w, h, 'k');
      [[2,2,'w'],[7,3,'a'],[12,2,'y'],[3,7,'A'],[9,7,'w'],[14,6,'a']].forEach(([nx,ny,cc]) => R(grid, x+nx, y+ny, 3, 3, cc));
    }
    function easel(grid, x, y) {
      LN(grid, x, y, x-4, y+16, 'l'); LN(grid, x+8, y, x+12, y+16, 'l'); LN(grid, x+4, y+16, x+4, y+22, 'm');
      R(grid, x-1, y+2, 12, 10, 'm'); FR(grid, x-1, y+2, 12, 10, 'k'); R(grid, x+1, y+4, 8, 6, 'a');
    }
    function paintcans(grid, x, y) { for (let i = 0; i < 3; i++) { R(grid, x+i*4, y, 3, 4, i===0?'r':i===1?'G':'a'); FR(grid, x+i*4, y, 3, 4, 'k'); } }
    function magnifier(grid, x, y) {
      FR(grid, x, y, 8, 8, 'l'); FR(grid, x+1, y+1, 6, 6, 'm'); R(grid, x+2, y+2, 4, 4, 'S');
      LN(grid, x+7, y+7, x+12, y+12, 'l'); LN(grid, x+8, y+7, x+13, y+12, 'l');
    }
    function counter(grid, x, y, w) {
      R(grid, x, y, w, 8, 'd'); FR(grid, x, y, w, 8, 'k'); HL(grid, x+1, y+1, w-2, 'l');
      R(grid, x+w-8, y-4, 6, 4, 'm'); FR(grid, x+w-8, y-4, 6, 4, 'k'); R(grid, x+w-7, y-3, 4, 2, 'a');
    }
    function sign(grid, x, y, w) {
      VL(grid, x+(w>>1), y-6, 6, 'd');
      R(grid, x, y, w, 7, 'd'); FR(grid, x, y, w, 7, 'k'); HL(grid, x+2, y+3, w-4, 'a');
    }

    /* ── per-room scene composition (a few distinct stamps each) ────── */
    const HB = HORIZON;   // things "stand" just above the horizon line
    const SCENES = {
      research(g) {
        for (let i = 0; i < 64; i++) P(g, (i*47)%GW, (i*23)%HB, i%7===0 ? 'A' : 'l');  // star field
        cabinet(g, 8, HB-14, 22, 14); screen(g, 10, HB-12, 18, 8);
        monitor(g, 33, HB-12, 12, 10);
        telescope(g, 60, HB-2);
        lights(g, [[10,HB-2,'G'],[14,HB-2,'a'],[38,HB-2,'r']]);
      },
      planning(g) {
        cabinet(g, 8, HB-13, 22, 13); screen(g, 10, HB-11, 18, 8);
        pinboard(g, 40, HB-14, 18, 12);
        cabinet(g, 64, HB-11, 12, 11); monitor(g, 66, HB-10, 8, 8);
        lights(g, [[11,HB-2,'a'],[15,HB-2,'a'],[42,HB-2,'G']]);
      },
      content(g) {
        cabinet(g, 8, HB-12, 22, 12); monitor(g, 11, HB-11, 15, 9);
        pinboard(g, 42, HB-15, 20, 13);
        cabinet(g, 68, HB-10, 10, 10);
        lights(g, [[12,HB-2,'a'],[44,HB-2,'y']]);
      },
      image_studio(g) {
        easel(g, 14, HB-22);
        shelf(g, 34, HB-14, 26); paintcans(g, 36, HB-6);
        monitor(g, 66, HB-12, 12, 10);
      },
      qa(g) {
        screen(g, 8, HB-16, 30, 16);
        magnifier(g, 46, HB-12);
        cabinet(g, 60, HB-6, 18, 6);
        lights(g, [[62,HB-9,'G'],[66,HB-9,'y'],[70,HB-9,'r']]);
      },
      storefront(g) {
        sign(g, 30, HB-20, 24);
        shelf(g, 6, HB-24, 24); shelf(g, 6, HB-14, 24);
        counter(g, 54, HB-8, 24);
      },
      marketing(g) {
        antenna(g, 20, HB-24, 24); rings(g, 20, HB-20, 'a');
        cabinet(g, 48, HB-12, 28, 12); screen(g, 50, HB-10, 24, 8);
        lights(g, [[50,HB-2,'r'],[54,HB-2,'G']]);
      },
      fulfillment(g) {
        R(g, 4, 22, GW-8, 3, 'd'); HL(g, 4, 22, GW-8, 'l');   // belt (overlay animates it)
        crate(g, 10, HB-12, 12, 12); crate(g, 24, HB-9, 9, 9); crate(g, 60, HB-11, 11, 11);
        cabinet(g, 40, HB-13, 16, 13);
      },
      ledger(g) {
        screen(g, 10, HB-16, 32, 16); bars(g, 14, HB-13, 24, 10);
        coins(g, 54, HB-1);
        cabinet(g, 68, HB-9, 10, 9);
      },
      __default(g) { cabinet(g, 30, HB-12, 24, 12); },
    };

    // Render a room scene grid ONCE to a crisp pixel-art data-URI background.
    function renderSceneURL(rkey, accent) {
      const pal = scenePalette(accent);
      const grid = mkGrid();
      stampFloor(grid);
      (SCENES[rkey] || SCENES.__default)(grid);
      const cv = document.createElement('canvas');
      cv.width = GW; cv.height = GH;
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#080f1a'; ctx.fillRect(0, 0, GW, GH);                 // dark back wall
      ctx.fillStyle = '#0a1420'; ctx.fillRect(0, HORIZON, GW, GH-HORIZON);   // floor base
      for (let y = 0; y < GH; y++) for (let x = 0; x < GW; x++) {
        const ch = grid[y][x]; if (ch === '.') continue;
        const col = pal[ch]; if (!col) continue;
        ctx.fillStyle = col; ctx.fillRect(x, y, 1, 1);
      }
      return cv.toDataURL('image/png');
    }

    /* ══ Robot wandering ══════════════════════════════════════════════════
       A per-room requestAnimationFrame loop moves each robot toward random
       targets on the open floor at a state-dependent speed (working = brisk/
       frequent, idle = slow/rare), facing its travel direction. Positions are
       written straight to each actor's transform (no React re-render per frame,
       and the static scene image is generated separately, once). */
    const WALK = { x0: 0.05, x1: 0.95, y0: 0.54, y1: 0.9 };   // walkable floor (fractions)
    const RW = 33, RH = 48;
    const WANDER = {
      working: { sp: 0.28, pmin: 250,  pmax: 900  },  // brisk, pauses briefly
      idle:    { sp: 0.11, pmin: 1600, pmax: 4200 },  // gentle, pauses often
      stale:   { sp: 0.05, pmin: 3000, pmax: 7000 },  // barely moves
      error:   { sp: 0.14, pmin: 150,  pmax: 500  },  // jittery
    };
    const rnd = (a, b) => a + Math.random() * (b - a);

    function startWander(floorEl, actors, states) {
      if (!floorEl || !actors || !actors.length) return () => {};
      let W = floorEl.clientWidth, H = floorEl.clientHeight;
      const ro = new ResizeObserver(() => { W = floorEl.clientWidth; H = floorEl.clientHeight; });
      ro.observe(floorEl);
      const sims = actors.filter(Boolean).map((el, i) => ({
        el, facing: el.querySelector('.robot-facing'),
        cc: WANDER[states[i]] || WANDER.idle,
        x: 0, y: 0, tx: null, ty: null, until: 0, dir: 1, init: false,
      }));
      let raf, last = performance.now();
      function tick(now) {
        const dt = Math.min(0.05, (now - last) / 1000); last = now;
        const w = W || 1, h = H || 1;
        const bx0 = WALK.x0 * w, bx1 = Math.max(bx0, WALK.x1 * w - RW);
        const by0 = WALK.y0 * h, by1 = Math.max(by0, WALK.y1 * h - RH);
        for (const s of sims) {
          if (!s.init) { s.x = rnd(bx0, bx1); s.y = rnd(by0, by1); s.init = true; }
          if (s.tx == null) {
            if (now >= s.until) { s.tx = rnd(bx0, bx1); s.ty = rnd(by0, by1); }   // pick a new target
          } else {
            const dx = s.tx - s.x, dy = s.ty - s.y, d = Math.hypot(dx, dy);
            const step = s.cc.sp * w * dt;   // px/s ∝ floor width → consistent speed
            if (d <= step) { s.x = s.tx; s.y = s.ty; s.tx = s.ty = null; s.until = now + rnd(s.cc.pmin, s.cc.pmax); }
            else {
              s.x += dx / d * step; s.y += dy / d * step;
              const nd = dx < -0.3 ? -1 : dx > 0.3 ? 1 : s.dir;
              if (nd !== s.dir) { s.dir = nd; if (s.facing) s.facing.style.transform = `scaleX(${nd})`; }
            }
          }
          s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, 0)`;
        }
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);
      return () => { cancelAnimationFrame(raf); ro.disconnect(); };
    }

    /* ── Room tile ─────────────────────────────────────────────────── */
    function Room({ rkey, room, onRoomClick, onCharClick }) {
      if (!room) return <div className="room" />;
      const cfg = ROOM_CFG[rkey] || {};
      const chars = room.characters || [];
      const state = robotState(room);
      const queued = backlog(rkey, room);

      // The static scene is generated ONCE per room (accent is fixed per room),
      // never on the poll cycle.
      const sceneURL = useMemo(() => renderSceneURL(rkey, cfg.color || '#5aa0e8'), [rkey, cfg.color]);

      const floorRef = useRef(null);
      const actorRefs = useRef([]);
      // One independent wander controller per robot. Re-init only when the robot
      // count or their states actually change — NOT on every 7s poll (positions
      // stay continuous across polls; React reuses the same actor DOM nodes).
      const states = chars.map(() => state);
      const sig = rkey + '|' + chars.length + '|' + states.join(',');
      useEffect(() => {
        return startWander(floorRef.current, actorRefs.current.slice(0, chars.length), states);
      }, [sig]);   // eslint-disable-line

      return (
        <div
          className={`room ${room.status || 'idle'}`}
          style={{ '--rc': cfg.color, '--rg': cfg.glow }}
          onClick={() => onRoomClick(rkey)}
        >
          <div className="scene" style={{ backgroundImage: `url(${sceneURL})` }} />
          <div className="scene-glow" />

          <div className="floor" ref={floorRef}>
            {chars.map((c, i) => (
              <div
                key={i}
                className="robot-actor"
                ref={el => { actorRefs.current[i] = el; }}
                title={c.name}
                onClick={e => { e.stopPropagation(); onCharClick(rkey, i); }}
              >
                <div className="robot-facing">
                  <Robot state={state} accent={cfg.color} />
                </div>
              </div>
            ))}
          </div>

          {rkey === 'fulfillment' && <div className="scene-conveyor" />}

          <div className="room-hdr">
            <span className="rdot" />
            <span className="rlabel">{cfg.icon} {room.label}</span>
          </div>
          <div className="rsummary">{room.summary}</div>
          {queued > 0 && <div className="qbadge-room">⏳ {queued} queued</div>}
        </div>
      );
    }

    /* ── Facility ──────────────────────────────────────────────────── */
    function Facility() {
      const [data, setData]       = useState(null);
      const [err, setErr]         = useState(null);
      const [lastTs, setLastTs]   = useState(null);
      const [panel, setPanel]     = useState(null); // { type, key, idx? }

      const fetch_ = useCallback(async () => {
        try {
          const res = await fetch(`${API}/dashboard/rooms/status`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setData(await res.json());
          setLastTs(new Date());
          setErr(null);
        } catch (e) {
          setErr(e.message);
        }
      }, []);

      useEffect(() => {
        fetch_();
        const id = setInterval(fetch_, POLL);
        return () => clearInterval(id);
      }, [fetch_]);

      if (!data && !err)  return <div className="fscreen">INITIALIZING FACILITY…</div>;
      if (!data && err)   return <div className="fscreen err">CONNECTION LOST — {err}</div>;

      const rooms   = data.rooms || {};
      const overall = data.workers_overall?.status || 'unknown';

      return (
        <>
          <header className="hdr">
            <span className="hdr-title">AI Factory Facility</span>
            <span className="hdr-meta">
              <span className={overall === 'ok' ? 'wstatus-ok' : 'wstatus-deg'}>
                ● WORKERS: {overall.toUpperCase()}
              </span>
              <span className="poll-ts">
                POLL {lastTs ? lastTs.toLocaleTimeString() : '—'}
                {err && <span className="stale-warn"> (stale)</span>}
              </span>
            </span>
          </header>

          <div className="facility">
            {ORDER.map(k => (
              <Room
                key={k}
                rkey={k}
                room={rooms[k]}
                onRoomClick={key => setPanel({ type: 'room', key })}
                onCharClick={(key, idx) => setPanel({ type: 'char', key, idx })}
              />
            ))}
          </div>

          {panel && (
            <Panel sel={panel} rooms={rooms} onClose={() => setPanel(null)} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Facility />);
  </script>
</body>
</html>
