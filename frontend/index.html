<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Factory — Facility</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07101f;
      color: #b8cce0;
      font-family: 'Courier New', 'Lucida Console', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #060e1c;
      border-bottom: 1px solid #112236;
      height: 44px;
    }
    .hdr-title {
      font-size: 0.78em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4ab8e8;
    }
    .hdr-meta {
      display: flex;
      gap: 20px;
      align-items: center;
      font-size: 0.65em;
      letter-spacing: 0.08em;
    }
    .wstatus-ok  { color: #2ef09a; }
    .wstatus-deg { color: #ff5533; }
    .poll-ts     { color: #294a6a; }
    .stale-warn  { color: #ff5533; }

    /* ── Facility grid ───────────────────────────────────────────── */
    .facility {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 3px;
      padding: 12px;
      height: calc(100vh - 44px);
    }

    /* ── Room ────────────────────────────────────────────────────── */
    .room {
      position: relative;
      background: #0b1628;
      border: 1px solid #112236;
      border-radius: 5px;
      padding: 14px 14px 10px;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .room:hover {
      border-color: var(--rc);
      box-shadow: 0 0 14px var(--rg);
    }
    .room.active  { border-color: var(--rc); box-shadow: inset 0 0 30px var(--rg); }
    .room.error   { border-color: #ff3030; box-shadow: inset 0 0 20px rgba(255,48,48,0.09); }
    .room.stale   { border-color: #e07020; box-shadow: inset 0 0 20px rgba(224,112,32,0.07); }

    /* corner accent */
    .room::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--rc, #4ab8e8) 0%, transparent 55%);
      opacity: 0.07;
      pointer-events: none;
      border-radius: 4px 0 0 0;
    }

    .room-hdr {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
    }
    .rdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--rc, #4ab8e8);
      flex-shrink: 0;
    }
    .room.active .rdot { animation: pulse 2.2s ease-in-out infinite; }
    .room.error  .rdot { background: #ff3030; animation: pulse 0.9s ease-in-out infinite; }
    .room.stale  .rdot { background: #e07020; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    .rlabel {
      font-size: 0.68em;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--rc, #4ab8e8);
      font-weight: bold;
    }
    .rsummary {
      font-size: 0.66em;
      color: #506a88;
      line-height: 1.45;
      margin-bottom: 8px;
    }

    /* ── Characters ──────────────────────────────────────────────── */
    .chars {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
    }
    .char {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 5px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .char:hover { background: rgba(255,255,255,0.05); }

    .cicon {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--rc, #4ab8e8);
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-bottom: 3px;
    }
    .char.active .cicon { animation: bob 3.2s ease-in-out infinite; }
    .char.stale  .cicon { border-color: #e07020; opacity: 0.65; }
    .char.error  .cicon { border-color: #ff3030; animation: bob 0.8s ease-in-out infinite; }

    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    .clabel {
      font-size: 0.52em;
      color: #3a5a78;
      text-align: center;
      max-width: 58px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Panel overlay ───────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(3, 9, 22, 0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .panel {
      background: #0b1628;
      border: 1px solid #1e3d60;
      border-radius: 6px;
      padding: 22px 24px;
      width: 460px;
      max-width: 92vw;
      max-height: 82vh;
      overflow-y: auto;
      box-shadow: 0 0 50px rgba(74,184,232,0.12);
    }
    .panel-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel-title { font-size: 0.82em; letter-spacing: 0.15em; text-transform: uppercase; color: #4ab8e8; }
    .panel-close {
      background: none;
      border: 1px solid #1e3d60;
      color: #4a7aa0;
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.78em;
    }
    .panel-close:hover { border-color: #4ab8e8; color: #4ab8e8; }

    .psec { margin-bottom: 16px; }
    .psec-lbl {
      font-size: 0.6em; letter-spacing: 0.12em;
      text-transform: uppercase; color: #2e4d6a;
      margin-bottom: 5px;
    }

    /* status badges */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 0.7em;
      font-weight: bold;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    .badge-active  { background: rgba(46,240,154,0.09); color: #2ef09a; border: 1px solid #2ef09a; }
    .badge-idle    { background: rgba(74,184,232,0.09); color: #4ab8e8; border: 1px solid #4ab8e8; }
    .badge-stale   { background: rgba(224,112,32,0.09); color: #e07020; border: 1px solid #e07020; }
    .badge-error   { background: rgba(255,48,48,0.09);  color: #ff6060; border: 1px solid #ff6060; }

    .wcard {
      background: rgba(255,255,255,0.02);
      border: 1px solid #112236;
      border-radius: 3px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .wcard-top { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
    .wcard-name { font-size: 0.78em; color: #c0d4ec; }
    .wcard-detail { font-size: 0.68em; color: #3a5a78; margin-top: 2px; }

    .counts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 7px;
    }
    .ccount {
      background: rgba(255,255,255,0.025);
      border: 1px solid #112236;
      border-radius: 3px;
      padding: 6px 8px;
      text-align: center;
    }
    .ccount-k { font-size: 0.58em; color: #2e4d6a; text-transform: uppercase; }
    .ccount-v { font-size: 1.18em; color: #b8cce0; font-weight: bold; }

    .elist { list-style: none; }
    .eitem { padding: 6px 0; border-bottom: 1px solid #0f1f35; font-size: 0.74em; }
    .eitem:last-child { border-bottom: none; }
    .esrc  { color: #4ab8e8; margin-bottom: 2px; }
    .emsg  { color: #7a9abb; }
    .etime { color: #243a54; font-size: 0.88em; }

    .no-errors { font-size: 0.74em; color: #2ef09a; }

    /* load / error full-screen */
    .fscreen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
      font-size: 0.82em; letter-spacing: 0.12em; color: #2a4a68;
    }
    .fscreen.err { color: #ff5533; }

    /* ── Pixel-art robot (pure CSS, box-shadow pixel grid) ───────────── */
    /* Each robot is two 3px "pixel" elements whose huge box-shadow lists
       paint the whole sprite: .robot__body draws the chassis, .robot__eyes
       draws only the cyan eyes so they can blink independently. The blue
       accent pixels use var(--robot-accent) so each room tints its own robot
       to that room's accent colour — one shared grid, no per-room sprite. */
    .robot {
      position: relative;
      width: 33px;   /* 11 cells × 3px */
      height: 48px;  /* 16 cells × 3px */
      margin: 0 auto 3px;
      transform-origin: 50% 92%;
      image-rendering: pixelated;
      --robot-accent: #5aa0e8;
    }
    .robot__body, .robot__eyes {
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 3px;   /* one pixel cell; rest drawn via box-shadow */
      background: transparent;
    }
    .robot__eyes { filter: drop-shadow(0 0 1.5px #4ff7ff); }

    /* idle: calm "breathing" bob — clearly waiting, not dead */
    .robot--idle { animation: robot-breathe 2.6s ease-in-out infinite; }
    @keyframes robot-breathe {
      0%, 100% { transform: translateY(0)     scaleY(1);    }
      50%      { transform: translateY(-1px)  scaleY(1.035); }
    }

    /* working: faster side-to-side shuffle/waddle + blinking eyes */
    .robot--working { animation: robot-work 0.42s ease-in-out infinite; }
    @keyframes robot-work {
      0%   { transform: translateX(-1.5px) rotate(-3deg); }
      50%  { transform: translateX(1.5px)  rotate(3deg);  }
      100% { transform: translateX(-1.5px) rotate(-3deg); }
    }
    .robot--working .robot__eyes { animation: robot-blink 1.5s steps(1, end) infinite; }
    @keyframes robot-blink {
      0%, 88%, 100% { opacity: 1; }
      91%, 96%      { opacity: 0.08; }
    }

    /* stale: worker offline — dimmed, greyed, very slow drift */
    .robot--stale {
      animation: robot-breathe 5s ease-in-out infinite;
      opacity: 0.45;
      filter: grayscale(0.7);
    }
    .robot--stale .robot__eyes { opacity: 0.3; }

    /* error: agitated shudder */
    .robot--error { animation: robot-shudder 0.28s ease-in-out infinite; }
    @keyframes robot-shudder {
      0%, 100% { transform: translateX(-1px); }
      50%      { transform: translateX(1px);  }
    }

    /* queued-work badge (real backlog count, not a fake extra robot) */
    .qbadge {
      margin-top: 2px;
      font-size: 0.5em;
      letter-spacing: 0.04em;
      color: #6f8dab;
      background: rgba(255,255,255,0.04);
      border: 1px solid #1b3350;
      border-radius: 3px;
      padding: 1px 4px;
      white-space: nowrap;
    }

    /* ── Themed room scenes (pure CSS backdrops) ─────────────────────── */
    .scene {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .scene::before, .scene::after { content: ''; position: absolute; }
    /* keep room text/robot above the scene */
    .room-hdr, .rsummary, .chars { position: relative; z-index: 2; }

    /* research — star map + tilted telescope tube */
    .scene--research {
      opacity: 0.4;
      background-image:
        radial-gradient(1.5px 1.5px at 18% 28%, var(--rc) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 68% 18%, var(--rc) 45%, transparent 50%),
        radial-gradient(2px 2px   at 44% 52%, var(--rc) 45%, transparent 50%),
        radial-gradient(1px 1px   at 84% 58%, var(--rc) 45%, transparent 50%),
        radial-gradient(1.5px 1.5px at 28% 74%, var(--rc) 45%, transparent 50%),
        radial-gradient(1px 1px   at 58% 82%, var(--rc) 45%, transparent 50%),
        radial-gradient(2px 2px   at 14% 54%, var(--rc) 45%, transparent 50%),
        radial-gradient(1px 1px   at 78% 78%, var(--rc) 45%, transparent 50%);
    }
    .scene--research::after {
      right: 15%; top: 22%; width: 34px; height: 7px;
      background: var(--rc); opacity: 0.14;
      border-radius: 2px; transform: rotate(-35deg);
    }

    /* planning — clipboard + checklist lines */
    .scene--planning::before {
      left: 50%; top: 52%; width: 46px; height: 56px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--rc); border-radius: 4px; opacity: 0.18;
    }
    .scene--planning::after {
      left: 50%; top: 52%; width: 30px; height: 44px;
      transform: translate(-50%, -50%);
      opacity: 0.16;
      background:
        linear-gradient(var(--rc), var(--rc)) left 4px /100% 2px no-repeat,
        linear-gradient(var(--rc), var(--rc)) left 16px/100% 2px no-repeat,
        linear-gradient(var(--rc), var(--rc)) left 28px/100% 2px no-repeat,
        linear-gradient(var(--rc), var(--rc)) left 40px/70%  2px no-repeat;
    }

    /* content — document with text lines + a pencil */
    .scene--content::before {
      left: 44%; top: 50%; width: 40px; height: 52px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--rc); border-radius: 3px; opacity: 0.16;
      background:
        linear-gradient(var(--rc), var(--rc)) center 14px/68% 2px no-repeat,
        linear-gradient(var(--rc), var(--rc)) center 24px/68% 2px no-repeat,
        linear-gradient(var(--rc), var(--rc)) center 34px/48% 2px no-repeat;
    }
    .scene--content::after {
      right: 14%; top: 28%; width: 8px; height: 40px;
      background: var(--rc); opacity: 0.18;
      transform: rotate(34deg);
      clip-path: polygon(0 0, 100% 0, 100% 82%, 50% 100%, 0 82%);
    }

    /* image studio — canvas + easel tripod */
    .scene--image_studio::before {
      left: 48%; top: 42%; width: 40px; height: 32px;
      transform: translate(-50%, -50%);
      border: 2px solid var(--rc); border-radius: 2px; opacity: 0.16;
    }
    .scene--image_studio::after {
      left: 50%; bottom: 10%; width: 44px; height: 34px;
      transform: translateX(-50%);
      background: var(--rc); opacity: 0.14;
      clip-path: polygon(45% 0, 55% 0, 100% 100%, 82% 100%, 50% 30%, 18% 100%, 0 100%);
    }

    /* QA — magnifying glass */
    .scene--qa::before {
      left: 43%; top: 42%; width: 32px; height: 32px;
      transform: translate(-50%, -50%);
      border: 3px solid var(--rc); border-radius: 50%; opacity: 0.18;
    }
    .scene--qa::after {
      left: 60%; top: 62%; width: 5px; height: 26px;
      background: var(--rc); opacity: 0.18;
      transform: rotate(-45deg); border-radius: 3px;
    }

    /* storefront — striped awning + counter */
    .scene--storefront::before {
      left: 50%; top: 26%; width: 58px; height: 16px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(90deg, var(--rc) 0 6px, transparent 6px 12px);
      opacity: 0.2; border-radius: 3px 3px 0 0;
    }
    .scene--storefront::after {
      left: 50%; top: 52%; width: 54px; height: 26px;
      transform: translateX(-50%);
      border: 2px solid var(--rc); border-radius: 2px; opacity: 0.15;
    }

    /* marketing — megaphone + radiating broadcast rings */
    .scene--marketing {
      opacity: 0.16;
      background:
        radial-gradient(circle at 44% 52%,
          transparent 0 9px, var(--rc) 9px 11px, transparent 11px 19px,
          var(--rc) 19px 21px, transparent 21px 31px,
          var(--rc) 31px 33px, transparent 33px);
    }
    .scene--marketing::before {
      left: 24%; top: 50%; width: 16px; height: 14px;
      transform: translate(-50%, -50%);
      background: var(--rc); opacity: 1;
      clip-path: polygon(0 30%, 60% 0, 100% 0, 100% 100%, 60% 100%, 0 70%);
    }

    /* fulfillment — stacked boxes + dashed conveyor belt */
    .scene--fulfillment::before {
      left: 36%; top: 40%; width: 20px; height: 16px;
      border: 2px solid var(--rc); border-radius: 2px; opacity: 0.18;
      box-shadow:
        24px 6px 0 0 var(--rc),
        11px -15px 0 0 var(--rc);
    }
    .scene--fulfillment::after {
      left: 8%; right: 8%; bottom: 24%; height: 0;
      border-top: 2px dashed var(--rc); opacity: 0.22;
    }

    /* ledger — stacked coins + ledger book */
    .scene--ledger::before {
      left: 40%; top: 40%; width: 30px; height: 8px;
      transform: translateX(-50%);
      background: var(--rc); opacity: 0.16; border-radius: 50%;
      box-shadow:
        0 -8px 0 0 var(--rc),
        0 -16px 0 0 var(--rc),
        0 8px 0 0 var(--rc);
    }
    .scene--ledger::after {
      left: 52%; top: 62%; width: 42px; height: 22px;
      transform: translateX(-50%);
      border: 2px solid var(--rc); border-radius: 2px; opacity: 0.14;
      background: linear-gradient(var(--rc), var(--rc)) center/2px 100% no-repeat;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API = window.location.origin;
    const POLL = 7000;

    const ROOM_CFG = {
      research:     { icon: '🔭', color: '#a78bfa', glow: 'rgba(167,139,250,0.13)' },
      planning:     { icon: '📋', color: '#60a5fa', glow: 'rgba(96,165,250,0.13)' },
      content:      { icon: '✏️',  color: '#34d399', glow: 'rgba(52,211,153,0.13)' },
      image_studio: { icon: '🎨', color: '#f472b6', glow: 'rgba(244,114,182,0.13)' },
      qa:           { icon: '🔍', color: '#fbbf24', glow: 'rgba(251,191,36,0.13)' },
      storefront:   { icon: '🏪', color: '#38bdf8', glow: 'rgba(56,189,248,0.13)' },
      marketing:    { icon: '📣', color: '#fb923c', glow: 'rgba(251,146,60,0.13)' },
      fulfillment:  { icon: '📦', color: '#4ade80', glow: 'rgba(74,222,128,0.13)' },
      ledger:       { icon: '📊', color: '#e879f9', glow: 'rgba(232,121,249,0.13)' },
    };

    const ORDER = [
      'research', 'planning', 'content',
      'image_studio', 'qa', 'storefront',
      'marketing', 'fulfillment', 'ledger',
    ];

    /* ── Pixel-art robot ───────────────────────────────────────────────
       The robot is defined as a readable 2D grid (one char per pixel), and
       the box-shadow CSS is generated from it at load time — no hand-written
       coordinates, no image files, no image-generation calls. Reference look:
       chunky white/grey body, blue accent panels, dark visor, two cyan eyes,
       black outline, antenna. 'B' pixels resolve to var(--robot-accent) so a
       room can tint its robot to its own accent colour. */
    const PX = 3;
    const ROBOT_COLORS = {
      K: '#0a0a12',                      // black outline
      W: '#eef3f8',                      // white body
      V: '#14263e',                      // dark head visor
      C: '#4ff7ff',                      // cyan eyes (separate layer, can blink)
      B: 'var(--robot-accent, #5aa0e8)', // blue accent panels — per-room tint
    };
    const ROBOT_GRID = [
      ".....K.....",  // antenna tip
      ".....K.....",  // antenna stem
      ".KKKKKKKKK.",  // head top
      ".KWWWWWWWK.",  // forehead
      ".KVVVVVVVK.",  // visor top
      ".KVCCVCCVK.",  // eyes
      ".KVVVVVVVK.",  // visor bottom
      ".KWWWWWWWK.",  // chin
      "KKKKKKKKKKK",  // shoulders (outline)
      "KBBWWWWWBBK",  // shoulders (blue) + white neck
      "KBWWWWWWWBK",  // arms (blue) + chest
      "KBWWBBBWWBK",  // chest panel (blue)
      "KBWWBBBWWBK",  // chest panel
      "KBWWWWWWWBK",  // lower chest
      "KKWWWWWWWKK",  // waist
      "..KKK.KKK..",  // legs / feet
    ];

    function buildShadows(grid, opts) {
      opts = opts || {};
      const parts = [];
      for (let r = 0; r < grid.length; r++) {
        for (let c = 0; c < grid[r].length; c++) {
          const ch = grid[r][c];
          if (ch === '.') continue;
          if (opts.only && opts.only.indexOf(ch) === -1) continue;
          if (opts.exclude && opts.exclude.indexOf(ch) !== -1) continue;
          const color = ROBOT_COLORS[ch];
          if (!color) continue;
          parts.push(`${c * PX}px ${r * PX}px 0 0 ${color}`);
        }
      }
      return parts.join(', ');
    }

    // Computed once: identical for every robot (accent is a CSS var, so a
    // single shadow string serves all rooms — no per-room recompute).
    const BODY_SHADOW = buildShadows(ROBOT_GRID, { exclude: ['C'] });
    const EYES_SHADOW = buildShadows(ROBOT_GRID, { only: ['C'] });

    function Robot({ state, accent }) {
      const cls =
        state === 'working' ? 'robot--working' :
        state === 'stale'   ? 'robot--stale'   :
        state === 'error'   ? 'robot--error'   : 'robot--idle';
      return (
        <div className={`robot ${cls}`} style={{ '--robot-accent': accent }}>
          <div className="robot__body" style={{ boxShadow: BODY_SHADOW }} />
          <div className="robot__eyes" style={{ boxShadow: EYES_SHADOW }} />
        </div>
      );
    }

    // Robot activity is driven ENTIRELY by the server's real per-room status
    // (already computed in /dashboard/rooms/status from heartbeats / real task
    // counts / recent-activity). 'active' → working, everything else → idle
    // (stale = worker offline, error = failing).
    function robotState(room) {
      switch (room.status) {
        case 'active': return 'working';
        case 'stale':  return 'stale';
        case 'error':  return 'error';
        default:       return 'idle';
      }
    }

    // Real queued/backlog work that is NOT currently being processed (workers
    // are single-threaded/sequential in this codebase, so surplus work is a
    // text badge — never a fake second "working" robot). Uses only counts the
    // status endpoint already returns.
    function backlog(rkey, room) {
      const c = room.counts || {};
      if (rkey === 'planning')  return c.queue || 0;                  // TaskQueue depth
      if (rkey === 'qa')        return Math.max(0, (c.QA || 0) - 1);  // 1 validated at a time
      if (rkey === 'marketing') return c.pending || 0;               // posts awaiting send
      return 0;
    }

    function Badge({ status }) {
      return <span className={`badge badge-${status}`}>{status}</span>;
    }

    /* ── Panel ─────────────────────────────────────────────────────── */
    function Panel({ sel, rooms, onClose }) {
      if (!sel) return null;
      const room = rooms[sel.key];
      if (!room) return null;
      const cfg = ROOM_CFG[sel.key] || {};

      let title, body;

      if (sel.type === 'char') {
        const c = (room.characters || [])[sel.idx] || {};
        title = `${cfg.icon} ${c.name}`;
        body = (
          <>
            <div className="psec">
              <div className="psec-lbl">Status</div>
              <Badge status={c.status || 'idle'} />
            </div>
            {c.heartbeat_age_s !== undefined && c.heartbeat_age_s !== null && (
              <div className="psec">
                <div className="psec-lbl">Heartbeat</div>
                <div style={{fontSize:'0.82em', color:'#c0d4ec'}}>{c.heartbeat_age_s}s ago</div>
              </div>
            )}
            {c.detail && (
              <div className="psec">
                <div className="psec-lbl">Detail</div>
                <div style={{fontSize:'0.78em', color:'#7a9abb'}}>{c.detail}</div>
              </div>
            )}
          </>
        );
      } else {
        title = `${cfg.icon} ${room.label}`;
        body = (
          <>
            <div className="psec">
              <div className="psec-lbl">Status</div>
              <div style={{display:'flex', alignItems:'center', gap:'10px', flexWrap:'wrap'}}>
                <Badge status={room.status} />
                <span style={{fontSize:'0.76em', color:'#506a88'}}>{room.summary}</span>
              </div>
            </div>

            {(room.characters || []).length > 0 && (
              <div className="psec">
                <div className="psec-lbl">Workers / Agents</div>
                {room.characters.map((c, i) => (
                  <div key={i} className="wcard">
                    <div className="wcard-top">
                      <Badge status={c.status || 'idle'} />
                      <span className="wcard-name">{c.name}</span>
                    </div>
                    {c.heartbeat_age_s !== undefined && c.heartbeat_age_s !== null && (
                      <div className="wcard-detail">Heartbeat: {c.heartbeat_age_s}s ago</div>
                    )}
                    {c.detail && <div className="wcard-detail">{c.detail}</div>}
                  </div>
                ))}
              </div>
            )}

            {room.counts && Object.keys(room.counts).length > 0 && (
              <div className="psec">
                <div className="psec-lbl">Counts</div>
                <div className="counts-grid">
                  {Object.entries(room.counts).map(([k, v]) => (
                    <div key={k} className="ccount">
                      <div className="ccount-k">{k.replace(/_/g, ' ')}</div>
                      <div className="ccount-v">
                        {typeof v === 'boolean' ? (v ? 'ON' : 'OFF') : v}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="psec">
              <div className="psec-lbl">Recent Errors</div>
              {(room.events || []).length === 0
                ? <div className="no-errors">No recent errors</div>
                : (
                  <ul className="elist">
                    {room.events.map((e, i) => (
                      <li key={i} className="eitem">
                        <div className="esrc">{e.source}</div>
                        <div className="emsg">{e.message}</div>
                        <div className="etime">{e.at ? new Date(e.at).toLocaleString() : ''}</div>
                      </li>
                    ))}
                  </ul>
                )
              }
            </div>
          </>
        );
      }

      return (
        <div className="overlay" onClick={onClose}>
          <div className="panel" onClick={e => e.stopPropagation()}>
            <div className="panel-hdr">
              <span className="panel-title">{title}</span>
              <button className="panel-close" onClick={onClose}>[ × ]</button>
            </div>
            {body}
          </div>
        </div>
      );
    }

    /* ── Room tile ─────────────────────────────────────────────────── */
    function Room({ rkey, room, onRoomClick, onCharClick }) {
      if (!room) return <div className="room" />;
      const cfg = ROOM_CFG[rkey] || {};

      // One robot per room: workers here are single-threaded/sequential, so
      // even with N queued tasks there is at most one genuinely-working unit.
      const c = (room.characters || [])[0];
      const state = robotState(room);
      const queued = backlog(rkey, room);

      return (
        <div
          className={`room ${room.status || 'idle'}`}
          style={{ '--rc': cfg.color, '--rg': cfg.glow }}
          onClick={() => onRoomClick(rkey)}
        >
          <div className={`scene scene--${rkey}`} />

          <div className="room-hdr">
            <span className="rdot" />
            <span className="rlabel">{cfg.icon} {room.label}</span>
          </div>
          <div className="rsummary">{room.summary}</div>

          <div className="chars">
            {c && (
              <div
                className="char"
                onClick={e => { e.stopPropagation(); onCharClick(rkey, 0); }}
                title={c.name}
              >
                <Robot state={state} accent={cfg.color} />
                <div className="clabel">{c.name}</div>
                {queued > 0 && <div className="qbadge">⏳ {queued} queued</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── Facility ──────────────────────────────────────────────────── */
    function Facility() {
      const [data, setData]       = useState(null);
      const [err, setErr]         = useState(null);
      const [lastTs, setLastTs]   = useState(null);
      const [panel, setPanel]     = useState(null); // { type, key, idx? }

      const fetch_ = useCallback(async () => {
        try {
          const res = await fetch(`${API}/dashboard/rooms/status`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          setData(await res.json());
          setLastTs(new Date());
          setErr(null);
        } catch (e) {
          setErr(e.message);
        }
      }, []);

      useEffect(() => {
        fetch_();
        const id = setInterval(fetch_, POLL);
        return () => clearInterval(id);
      }, [fetch_]);

      if (!data && !err)  return <div className="fscreen">INITIALIZING FACILITY…</div>;
      if (!data && err)   return <div className="fscreen err">CONNECTION LOST — {err}</div>;

      const rooms   = data.rooms || {};
      const overall = data.workers_overall?.status || 'unknown';

      return (
        <>
          <header className="hdr">
            <span className="hdr-title">AI Factory Facility</span>
            <span className="hdr-meta">
              <span className={overall === 'ok' ? 'wstatus-ok' : 'wstatus-deg'}>
                ● WORKERS: {overall.toUpperCase()}
              </span>
              <span className="poll-ts">
                POLL {lastTs ? lastTs.toLocaleTimeString() : '—'}
                {err && <span className="stale-warn"> (stale)</span>}
              </span>
            </span>
          </header>

          <div className="facility">
            {ORDER.map(k => (
              <Room
                key={k}
                rkey={k}
                room={rooms[k]}
                onRoomClick={key => setPanel({ type: 'room', key })}
                onCharClick={(key, idx) => setPanel({ type: 'char', key, idx })}
              />
            ))}
          </div>

          {panel && (
            <Panel sel={panel} rooms={rooms} onClose={() => setPanel(null)} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Facility />);
  </script>
</body>
</html>
