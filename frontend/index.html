<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Factory Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Dashboard() {
      const [overview, setOverview] = useState(null);
      const [metrics, setMetrics] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchData = async () => {
          try {
            const [ovRes, metRes] = await Promise.all([
              fetch('http://localhost:8000/dashboard/overview'),
              fetch('http://localhost:8000/dashboard/metrics'),
            ]);
            setOverview(await ovRes.json());
            setMetrics(await metRes.json());
          } catch (err) {
            console.error('Failed to fetch dashboard data:', err);
          } finally {
            setLoading(false);
          }
        };

        fetchData();
        const interval = setInterval(fetchData, 5000);
        return () => clearInterval(interval);
      }, []);

      if (loading) return <div style={{ padding: '20px' }}>Loading...</div>;
      if (!overview || !metrics) return <div style={{ padding: '20px' }}>Error loading data</div>;

      const cardStyle = {
        backgroundColor: '#f9f9f9',
        border: '1px solid #ddd',
        borderRadius: '5px',
        padding: '15px',
        textAlign: 'center',
      };

      const labelStyle = {
        fontSize: '0.9em',
        color: '#666',
        marginBottom: '8px',
      };

      const valueStyle = {
        fontSize: '1.8em',
        fontWeight: 'bold',
        color: '#333',
      };

      return (
        <div style={{ fontFamily: 'sans-serif', padding: '20px', maxWidth: '1200px', margin: '0 auto' }}>
          <h1>AI Factory Dashboard</h1>

          <div style={{ marginBottom: '30px' }}>
            <h2>Overview</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '15px' }}>
              <div style={cardStyle}>
                <div style={labelStyle}>Total Tasks</div>
                <div style={valueStyle}>{overview.total_tasks}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>Queue Size</div>
                <div style={valueStyle}>{overview.queue_size}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>NEW</div>
                <div style={valueStyle}>{overview.status_counts.NEW || 0}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>PLANNED</div>
                <div style={valueStyle}>{overview.status_counts.PLANNED || 0}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>RUNNING</div>
                <div style={valueStyle}>{overview.status_counts.RUNNING || 0}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>QA</div>
                <div style={valueStyle}>{overview.status_counts.QA || 0}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>DONE</div>
                <div style={valueStyle}>{overview.status_counts.DONE || 0}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>FAILED</div>
                <div style={valueStyle}>{overview.status_counts.FAILED || 0}</div>
              </div>
            </div>
          </div>

          <div style={{ marginBottom: '30px' }}>
            <h2>Metrics</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '15px' }}>
              <div style={cardStyle}>
                <div style={labelStyle}>Success Rate</div>
                <div style={valueStyle}>
                  {metrics.success_rate !== null ? (metrics.success_rate * 100).toFixed(1) : 'N/A'}%
                </div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>Avg Retries</div>
                <div style={valueStyle}>{metrics.average_retry_count.toFixed(2)}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>Avg Processing</div>
                <div style={valueStyle}>
                  {metrics.average_processing_seconds !== null
                    ? metrics.average_processing_seconds.toFixed(1)
                    : 'N/A'}
                  s
                </div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>Total Tokens</div>
                <div style={valueStyle}>{metrics.token_usage.total_tokens}</div>
              </div>
              <div style={cardStyle}>
                <div style={labelStyle}>LLM Calls</div>
                <div style={valueStyle}>{metrics.token_usage.llm_call_count}</div>
              </div>
            </div>
          </div>

          {overview.recent_errors.length > 0 && (
            <div>
              <h2>Recent Errors</h2>
              <div style={{ backgroundColor: '#f5f5f5', padding: '15px', borderRadius: '5px' }}>
                {overview.recent_errors.map((err, idx) => (
                  <div key={idx} style={{ marginBottom: '10px', paddingBottom: '10px', borderBottom: '1px solid #ddd' }}>
                    <div style={{ fontWeight: 'bold', color: '#d32f2f' }}>{err.source}</div>
                    <div style={{ fontSize: '0.9em', color: '#666' }}>{err.message}</div>
                    <div style={{ fontSize: '0.8em', color: '#999' }}>
                      {new Date(err.created_at).toLocaleString()}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
